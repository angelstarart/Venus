name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
  IMAGE_TAG: ${{ github.sha }}
  DOCKER_IMAGE_NAME: venus
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-push.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Confirm secrets
        run: |
          echo "${{ secrets.REGISTRY_USER }}"

      - name: Build, tag, and push image to Docker Hub
        #        id: build-push
        #        run: |
        #          docker build -t $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG -t $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:latest .
        #          docker push $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG
        #          docker push $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:latest
        #          echo "image=$REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
        uses: docker/build-push-action@v7.3.0
        with:
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: image output
        run: |
          echo "Image: ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "SHA: ${{ github.sha }}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script : |
            cd /var/www/venus
            ls -al
            echo "${{ secrets.REGISTRY_PASSWORD}}" | docker login -u "${{ secrets.REGISTRY_USER}}" --password-stdin
            docker pull ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            docker-compose -f docker-compose.yml up -d
            docker image prune -f

#      - name: Stop and remove existing container if running
#        run: |
#          docker stop venus || true
#          docker rm venus || true

#      - name: Pull the latest image
#        run: docker pull ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:latest

#      - name: Run the new container
#        run: docker run -d --name venus -p 80:80 -p 443:443 --restart always ${{ secrets.REGISTRY_USER }}/${{ env.DOCKER_IMAGE_NAME }}:latest

#      - name: Remove dangling images to free disk space
#        run: docker image prune -f

      - name: Completed deploy
        run: |
          echo "Completed deploy"
