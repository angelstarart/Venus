name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-push.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build, tag, and push image to Docker Hub
        id: build-push
        run: |
          docker build -t $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG -t $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:latest .
          docker push $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG
          docker push $REGISTRY_USER/${GITHUB_REPOSITORY##*/}:latest
          echo "image=$REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY_USER,REGISTRY_PASSWORD,IMAGE_TAG
          script: |
            # Authenticate Docker with Docker Hub
            echo "$REGISTRY_PASSWORD" | docker login --username "$REGISTRY_USER" --password-stdin

            # Pull the new image
            docker pull "$REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG"

            # Stop and remove the existing container (ignore errors if not running)
#            docker stop angelstar || true
#            docker rm   angelstar || true

            # Start the new container
            # - /etc/letsencrypt is mounted so SSL certs are available to the app
            # - /etc/.env is mounted for secrets (set NODE_ENV/PORT via Dockerfile CMD)
#            docker run -d \
#              --name angelstar \
#              --restart unless-stopped \
#              -p 80:80 \
#              -p 443:443 \
#              -v /etc/letsencrypt:/etc/letsencrypt:ro \
#              --env-file /etc/angelstar.env \
#              "$REGISTRY_USER/${GITHUB_REPOSITORY##*/}:$IMAGE_TAG"

            # Remove dangling images to free disk space
            docker image prune -f
